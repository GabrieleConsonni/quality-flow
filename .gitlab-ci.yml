include:
  - project: "devops/gitlab-ci-templates"
    ref: master
    file: docker.gitlab-ci.yml

default:
  tags:
    - docker

stages:
  - build

build:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  variables:
    IMAGE: akeron-quality-flow:dev
    REGISTRY: aknregistry.azurecr.io
    DOCKERFILE: ./docker/Dockerfile
  extends: .build-docker-image

# build-ui (Streamlit) removed with the Test Suites refactor.
# The new FE lives in the sibling `quality-flow-ng-app` repo and has its
# own CI pipeline.
